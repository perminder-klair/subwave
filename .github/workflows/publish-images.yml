name: Publish images

# Builds and pushes the five first-party SUB/WAVE images to GHCR.
#
# Triggers:
#   - push of a tag like v1.2.3 → versioned release (also tagged :latest)
#   - manual workflow_dispatch    → ad-hoc rebuild from the chosen ref
#
# Images:
#   ghcr.io/<owner>/subwave-caddy       (bakes docker/Caddyfile)
#   ghcr.io/<owner>/subwave-broadcast   (icecast2 + liquidsoap + radio.liq + sounds/)
#   ghcr.io/<owner>/subwave-controller
#   ghcr.io/<owner>/subwave-web
#   ghcr.io/<owner>/subwave-tts-heavy   (optional Chatterbox + PocketTTS sidecar, ~3-4GB)
#
# Platforms: linux/amd64 only. Dockerfile.controller pins amd64 in compose
# because Piper, Kokoro, and Chatterbox wheels are amd64-only.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: subwave-caddy
            dockerfile: docker/Dockerfile.caddy
          - image: subwave-broadcast
            dockerfile: docker/Dockerfile.broadcast
          - image: subwave-controller
            dockerfile: docker/Dockerfile.controller
          - image: subwave-web
            dockerfile: web/Dockerfile
          - image: subwave-tts-heavy
            dockerfile: docker/Dockerfile.tts-heavy
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
