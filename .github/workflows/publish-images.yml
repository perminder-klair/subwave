name: Publish images

# Builds and pushes the first-party SUB/WAVE images to GHCR.
#
# Triggers:
#   - push of a tag like v1.2.3 → versioned release (also tagged :latest)
#   - manual workflow_dispatch    → ad-hoc rebuild from the chosen ref
#
# Images:
#   ghcr.io/<owner>/subwave-caddy       (bakes docker/Caddyfile)
#   ghcr.io/<owner>/subwave-broadcast   (icecast2 + liquidsoap + radio.liq + sounds/)
#   ghcr.io/<owner>/subwave-controller
#   ghcr.io/<owner>/subwave-web
#   ghcr.io/<owner>/subwave-aio         (whole stack in one container — the Unraid
#                                        Community Applications one-click image)
#   ghcr.io/<owner>/subwave-tts-heavy   (optional Chatterbox + PocketTTS sidecar, ~3-4GB)
#
# Platforms: the core four images (caddy, broadcast, controller, web) are
# multi-arch (linux/amd64 + linux/arm64) so Apple Silicon and ARM servers run
# natively instead of under emulation. Dockerfile.controller selects the
# matching Piper build via $TARGETARCH; Kokoro/onnx have arm64 wheels. The
# optional tts-heavy sidecar stays amd64-only — its heavy PyTorch stack makes
# an arm64 cross-build slow/large, and it's opt-in (runs fine under emulation).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: subwave-caddy
            dockerfile: docker/Dockerfile.caddy
            platforms: linux/amd64,linux/arm64
          - image: subwave-broadcast
            dockerfile: docker/Dockerfile.broadcast
            platforms: linux/amd64,linux/arm64
          - image: subwave-controller
            dockerfile: docker/Dockerfile.controller
            platforms: linux/amd64,linux/arm64
          - image: subwave-web
            dockerfile: web/Dockerfile
            platforms: linux/amd64,linux/arm64
          # The Unraid one-click image: the whole stack (icecast2 + liquidsoap,
          # controller, web, Caddy) in one container, supervised by
          # docker/aio/supervisor.sh. amd64-only (x86-64 — every Unraid box, the
          # target for this image). arm64 is deliberately NOT built here: the
          # bundled Next.js webbuild fails its arm64 cross-build under QEMU
          # because lightningcss (Tailwind) can't load its native
          # `lightningcss.linux-arm64-gnu.node` binary in the emulated stage.
          # Native-arm64 users can still run the split-stack images, which stay
          # multi-arch. Revisit if the lightningcss/QEMU issue is resolved.
          - image: subwave-aio
            dockerfile: docker/Dockerfile.aio
            platforms: linux/amd64
            # Lean by default: the bundled analyzer is librosa-only
            # (bpm/key/intro/loudness), no torch. The subwave-aio-heavy entry
            # below bakes CLAP + Demucs for operators who want "sounds-like".
            build_args: |
              WITH_CLAP=0
              WITH_DEMUCS=0
          # Heavy AIO — same one-click container with the CLAP "sounds-like" +
          # Demucs vocal stack baked in (~1.5GB torch each). Unraid one-click
          # users who want those dimensions repoint their container at the
          # `-heavy` tag; everyone else uses the lean subwave-aio above.
          - image: subwave-aio-heavy
            dockerfile: docker/Dockerfile.aio
            platforms: linux/amd64
            build_args: |
              WITH_CLAP=1
              WITH_DEMUCS=1
          - image: subwave-tts-heavy
            dockerfile: docker/Dockerfile.tts-heavy
            platforms: linux/amd64
            # Bake the CLAP audio-embedding stack ("sounds-like" similarity +
            # sonic journeys) and Demucs vocal-activity ranges into the published
            # image. Both are lazy-loaded at runtime (only when the analyze pass
            # is actually run), so this costs pull/disk size only — no RAM/CPU
            # for operators who never enable them. Baking them in is what lets
            # `--profile tts-heavy` users pull a ready image instead of having to
            # rebuild from source (issue #393).
            build_args: |
              WITH_CLAP=1
              WITH_DEMUCS=1
          # The default-on acoustic-analysis sidecar. LEAN + MULTI-ARCH: librosa
          # only (bpm/key/intro/loudness), no torch — small enough to ship on by
          # default and run natively on arm64 (NAS/Pi/Apple-Silicon). CLAP
          # "sounds-like" + Demucs vocals are the heavy opt-in below.
          - image: subwave-analyzer
            dockerfile: docker/Dockerfile.analyzer
            platforms: linux/amd64,linux/arm64
            build_args: |
              WITH_CLAP=0
              WITH_DEMUCS=0
          # Heavy analyzer — same image with the CLAP + Demucs CPU-torch stack
          # baked in (~1.4GB). amd64-only (matching tts-heavy — the heavy PyTorch
          # stack). Operators opt in with ANALYZER_HEAVY=1 in .env, which points
          # the compose `analyzer` service at this `-heavy` image. Lazy-loaded
          # weights at runtime, disk cost only.
          - image: subwave-analyzer-heavy
            dockerfile: docker/Dockerfile.analyzer
            platforms: linux/amd64
            build_args: |
              WITH_CLAP=1
              WITH_DEMUCS=1
    steps:
      # fetch-depth: 0 pulls full history + tags so `git describe` resolves the
      # version on a workflow_dispatch from a branch (a tag push already has the
      # tag at HEAD).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The version stamped into the images (admin footer + controller). On a tag
      # push `git describe` returns the tag (e.g. v0.31.0); a branch dispatch
      # yields <tag>-<n>-g<sha>. Empty → builds fall back to package.json.
      - id: version
        run: echo "version=$(git describe --tags --always 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      # QEMU provides the cross-arch emulation buildx needs to build the
      # linux/arm64 variant on the amd64 GitHub runner.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          build-args: |
            ${{ matrix.build_args }}
            SUBWAVE_BUILD_VERSION=${{ steps.version.outputs.version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
