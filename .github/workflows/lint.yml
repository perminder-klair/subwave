name: Lint

# Runs ESLint + tsc --noEmit on every PR and on pushes to main/develop.
# controller/ and web/ expose `npm run lint` (`eslint . && tsc --noEmit`);
# mcp-subwave/ exposes `npm run lint` (`tsc --noEmit`). This just enforces them.
#
# The two packages run in a matrix so a controller failure doesn't mask a
# web failure (and vice versa). Branch protection on main/develop should
# require both jobs.
#
# Security note: no untrusted user input (PR title/body/commit message)
# flows into any `run:` step. Only workflow-defined matrix values and
# built-in github context fields are interpolated.

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: lint (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [controller, web, mcp-subwave]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - run: npm ci --no-audit --no-fund

      # mcp-subwave is a thin launcher that imports the shared MCP sources from
      # controller/src/mcp/**, so its `tsc --noEmit` type-checks those files —
      # which resolve @modelcontextprotocol/sdk + zod from controller/node_modules.
      # Install the controller's deps too, or the type-check can't find them.
      - name: Install controller deps (mcp-subwave cross-package import)
        if: matrix.package == 'mcp-subwave'
        working-directory: controller
        run: npm ci --no-audit --no-fund

      - run: npm run lint
