name: 🎛️ Share a skill with the community
description: Contribute a prompt-only DJ skill (a between-track segment) to the shared catalog — no fork, no YAML. Fill this in and a pull request is opened for you automatically.
title: "Add skill: "
labels: ["skill-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing a skill! A skill is an autonomous segment the DJ can air
        between tracks — a short brief telling it what to say (and when to stay quiet).
        A bot turns this issue into a one-file pull request; a maintainer reviews and
        merges it, and it ships to every station as an installable community skill.

        **This path is for prompt-only skills** — a brief plus a few knobs. Skills that
        run their own `tool.mjs` code aren't accepted here (yet). **You don't need to fork anything.**
  - type: input
    id: skill-name
    attributes:
      label: Skill slug
      description: Lowercase, hyphenated, starts with a letter or digit (a–z, 0–9, hyphens), ≤49 chars. This is the folder name and must be unique — it can't shadow a built-in (weather, news, curiosity, …).
      placeholder: moon-phase
    validations:
      required: true
  - type: input
    id: label
    attributes:
      label: Display name
      description: The human-friendly name shown in the skills list.
      placeholder: Moon Phase
    validations:
      required: false
  - type: textarea
    id: brief
    attributes:
      label: The brief
      description: >
        What the DJ says on air, written the way they'd read it — one or two lines, in
        character. Say plainly when the segment is better left unaired. Don't pad it with
        "here's a fun segment"; just write the instruction.
      placeholder: A single line about tonight's moon phase, dropped in like you glanced out the window. If you're unsure of the phase, skip it rather than guess.
    validations:
      required: true
  - type: input
    id: cooldown
    attributes:
      label: Cooldown
      description: Minimum gap between airings. e.g. 45m, 6h, 2d, or a bare number (minutes). Defaults to 60m.
      placeholder: 6h
    validations:
      required: false
  - type: input
    id: context
    attributes:
      label: Context fields
      description: >
        Comma-separated list of "right now" facts this segment may weave in. Valid values:
        date, clock, time, weather, festival, show, listeners. Leave blank for the default.
      placeholder: time, weather
    validations:
      required: false
  - type: dropdown
    id: window
    attributes:
      label: When it can air
      description: Restrict to commute hours, or leave as any time.
      options:
        - any
        - commute
      default: 0
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: What is it? (for reviewers)
      description: One or two sentences on what this skill does and why it's worth sharing. Not saved into the skill — just helps the maintainer review.
      placeholder: A gentle recurring note about the current moon phase for late-night listeners.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        ### Contribution terms

        By submitting a skill you agree:

        - The brief is your own work (or cleared for sharing), and contains nothing
          unlawful, hateful, or designed to deceive listeners.
        - It contains no secrets, personal data, or instructions to fetch untrusted code.
        - Your GitHub username is recorded as the skill's submitter (shown as a credit
          line in the community catalog), along with the dates it was added and last updated.
        - SUB/WAVE may include, edit, or remove it from the catalog at its discretion.
        - It's shared under the same licence as the SUB/WAVE repository.

        This isn't legal advice.
  - type: checkboxes
    id: confirm
    attributes:
      label: Before you submit
      options:
        - label: This is a prompt-only skill — it needs no custom code to work.
          required: true
        - label: I understand a pull request will be opened from this issue and a maintainer will review it.
          required: true
        - label: I agree to the contribution terms above.
          required: true
