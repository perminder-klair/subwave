# Dependabot config — automated dependency PRs.
#
# Weekly cadence with grouping to keep PR noise low: minor+patch updates are
# batched per ecosystem/directory, majors still open individually so breaking
# bumps get their own review.
#
# Coverage:
#   - github-actions: all workflows under .github/
#   - docker: /docker (Dockerfile.*) and /web (web/Dockerfile) base images
#   - npm: every directory that has its own package.json + package-lock.json
#     (/, /controller, /web, /cli, /app)
version: 2
updates:
  # --- GitHub Actions -------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # --- Docker base images ---------------------------------------------------
  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
    groups:
      docker:
        patterns: ["*"]
  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: weekly
    groups:
      docker:
        patterns: ["*"]

  # --- npm (one entry per package.json + lockfile) --------------------------
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: /controller
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: /cli
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: /app
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
