# SUB/WAVE — orchestration (Mac local smoke-test variant)
# Runs: Icecast (broadcast) → Liquidsoap (mixer) → Controller (brain)
# Web UI runs separately (next.js dev/prod)
#
# Ollama is always reached over the network (see controller/.env). Navidrome
# is too by default — but `subwave setup` can opt into a managed Navidrome
# container via the `navidrome` compose profile (COMPOSE_PROFILES in docker/.env).

services:
  # -------------------------------------------------------------------------
  # ICECAST — the broadcast endpoint listeners connect to
  # -------------------------------------------------------------------------
  icecast:
    image: moul/icecast:latest
    container_name: sub-wave-icecast
    restart: unless-stopped
    ports:
      - "7702:7702"
    environment:
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD:-changeme}
      - ICECAST_ADMIN_PASSWORD=${ICECAST_ADMIN_PASSWORD:-changeme}
      - ICECAST_PASSWORD=${ICECAST_RELAY_PASSWORD:-changeme}
      - ICECAST_HOSTNAME=localhost
    volumes:
      # Rendered by scripts/setup.sh from icecast.xml.template — keeps secrets
      # out of the repo and lets the moul/icecast entrypoint's sed run cleanly.
      - ../state/icecast.xml:/etc/icecast2/icecast.xml:ro

  # -------------------------------------------------------------------------
  # LIQUIDSOAP — pulls from queue file, broadcasts to Icecast
  # -------------------------------------------------------------------------
  liquidsoap:
    build:
      context: ..
      dockerfile: docker/Dockerfile.liquidsoap
    image: sub-wave-liquidsoap:local
    container_name: sub-wave-liquidsoap
    restart: unless-stopped
    depends_on:
      - icecast
    environment:
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD:-changeme}
      - TZ=${TZ:-Europe/London}
    extra_hosts:
      # Lets Liquidsoap fetch Subsonic stream URLs that point at host services
      # (e.g. NAVIDROME_URL=http://host.docker.internal:4533) without leaking
      # the lookup to public DNS.
      - "host.docker.internal:host-gateway"
    volumes:
      - ../liquidsoap/radio.liq:/etc/liquidsoap/radio.liq:ro
      - ../sounds:/sounds:ro
      - ../state:/var/sub-wave
      - ../state/logs:/var/log/liquidsoap
    command: liquidsoap /etc/liquidsoap/radio.liq

  # -------------------------------------------------------------------------
  # CONTROLLER — the AI DJ brain
  # -------------------------------------------------------------------------
  controller:
    build:
      context: ..
      dockerfile: docker/Dockerfile.controller
    platform: linux/amd64
    container_name: sub-wave-controller
    restart: unless-stopped
    environment:
      # Without TZ the container runs in UTC; schedule slots (day-of-week +
      # hour) would then resolve an hour off from the admin UI during BST.
      - TZ=${TZ:-Europe/London}
      # In-container path of the shared state mount below. The controller
      # derives every state file path from this; native dev (npm run dev)
      # has no STATE_DIR and falls back to the repo-local state/ dir.
      - STATE_DIR=/var/sub-wave
      # In-container path of the repo-bundled static audio mount below.
      # ensureDefaults() copies the default sound effects from here.
      - SOUNDS_DIR=/sounds
    depends_on:
      - liquidsoap
    ports:
      - "7701:7701"
    env_file:
      - ../controller/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../state:/var/sub-wave
      - ../sounds:/sounds:ro

  # -------------------------------------------------------------------------
  # NAVIDROME — optional managed music server (Subsonic API)
  # -------------------------------------------------------------------------
  # Off by default. `subwave setup` opts in by writing COMPOSE_PROFILES=navidrome
  # to docker/.env; the controller + liquidsoap then reach it on the compose
  # network as http://navidrome:4533. Operators who run their own Navidrome
  # leave the profile unset and this service never starts.
  navidrome:
    image: deluan/navidrome:latest
    container_name: sub-wave-navidrome
    restart: unless-stopped
    profiles: ["navidrome"]
    # Published so the operator can open the Navidrome UI and complete the
    # initial library scan. (Prod keeps it internal — see the prod compose.)
    ports:
      - "4533:4533"
    environment:
      # First-boot auto-provision of the `admin` user. The controller
      # authenticates as admin/<NAVIDROME_PASS> via the Subsonic API.
      # `:-` (not `:?`) — interpolation runs file-wide even when the profile
      # is off, so a required-var would break external-Navidrome operators.
      # The setup wizard always sets NAVIDROME_PASS when the profile is on.
      - ND_DEVAUTOCREATEADMINPASSWORD=${NAVIDROME_PASS:-changeme}
      - TZ=${TZ:-Europe/London}
    volumes:
      # Music dir + Navidrome's own data dir — both host paths chosen by the
      # setup wizard (defaults under state/). Music is mounted read-only.
      - ${NAVIDROME_MUSIC_DIR:-../state/music}:/music:ro
      - ${NAVIDROME_DATA_DIR:-../state/navidrome}:/data
