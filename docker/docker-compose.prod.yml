# SUB/WAVE — production orchestration.
# Only Caddy is exposed on the host (:80). Cloudflare terminates TLS in front.
# Icecast, Liquidsoap, Controller, and Web are all internal-only and reachable
# via Caddy's reverse proxy under one origin (/api, /stream.mp3, /).
#
# State persists in <repo>/state by default (override with STATE_DIR). It is a
# bind mount, so `docker compose down -v` (named-volume wipe) won't touch it —
# but it lives inside the repo, so keep it clear of `git clean -dffx`.

x-state: &state-mount ${STATE_DIR:-../state}:/var/sub-wave

services:
  # -------------------------------------------------------------------------
  # CADDY — public edge, the only service bound to a host port
  # -------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: sub-wave-caddy
    restart: unless-stopped
    depends_on:
      - web
      - controller
      - icecast
    ports:
      - "${CADDY_PORT:-7700}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  # -------------------------------------------------------------------------
  # ICECAST — broadcast endpoint (internal only)
  # -------------------------------------------------------------------------
  icecast:
    image: moul/icecast:latest
    platform: linux/amd64
    container_name: sub-wave-icecast
    restart: unless-stopped
    environment:
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD:?must be set}
      - ICECAST_ADMIN_PASSWORD=${ICECAST_ADMIN_PASSWORD:?must be set}
      - ICECAST_PASSWORD=${ICECAST_RELAY_PASSWORD:?must be set}
      - ICECAST_HOSTNAME=localhost
    volumes:
      # Rendered by scripts/setup.sh from icecast.xml.template — keeps secrets
      # out of the repo and lets the moul/icecast entrypoint's sed run cleanly.
      - ${STATE_DIR:-../state}/icecast.xml:/etc/icecast2/icecast.xml:ro

  # -------------------------------------------------------------------------
  # LIQUIDSOAP — mixer, pulls from queue file, broadcasts to Icecast
  # -------------------------------------------------------------------------
  liquidsoap:
    # Pulls from GHCR by default. Override with `docker compose build liquidsoap`
    # to rebuild locally from the Dockerfile below. Pin a version via
    # SUBWAVE_VERSION in docker/.env (e.g. SUBWAVE_VERSION=v1.2.3).
    image: ghcr.io/perminder-klair/subwave-liquidsoap:${SUBWAVE_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.liquidsoap
    container_name: sub-wave-liquidsoap
    restart: unless-stopped
    depends_on:
      - icecast
    environment:
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD:?must be set}
      # Keeps the hourly archive paths (%Y-%m-%d/%H-00.mp3) on local wall time.
      - TZ=${TZ:-Europe/London}
    extra_hosts:
      # Lets Liquidsoap fetch Subsonic stream URLs that point at host services
      # (e.g. NAVIDROME_URL=http://host.docker.internal:4533) without leaking
      # the lookup to public DNS.
      - "host.docker.internal:host-gateway"
    volumes:
      - ../liquidsoap/radio.liq:/etc/liquidsoap/radio.liq:ro
      - ../sounds:/sounds:ro
      - *state-mount
      - ${STATE_DIR:-../state}/logs:/var/log/liquidsoap
    command: liquidsoap /etc/liquidsoap/radio.liq

  # -------------------------------------------------------------------------
  # CONTROLLER — AI DJ brain
  # -------------------------------------------------------------------------
  controller:
    image: ghcr.io/perminder-klair/subwave-controller:${SUBWAVE_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.controller
    platform: linux/amd64
    container_name: sub-wave-controller
    restart: unless-stopped
    depends_on:
      - liquidsoap
    environment:
      # Enables the production-only admin gate: refuses to boot unless
      # ADMIN_USER + ADMIN_PASS are set in controller/.env. Local dev (using
      # docker-compose.yml) leaves NODE_ENV unset so admin auth stays opt-in.
      - NODE_ENV=production
      # Schedule slots are stored by day-of-week + hour; resolveActiveShow()
      # reads them with date.getHours(). Without TZ the container runs in UTC
      # and fires shows an hour early during BST, out of sync with the admin UI
      # (which computes the on-air slot in the browser's timezone).
      - TZ=${TZ:-Europe/London}
      # In-container path of the *state-mount below. The controller derives
      # every state file path from this. Note this is distinct from the
      # host-side STATE_DIR used to interpolate the mount source above.
      - STATE_DIR=/var/sub-wave
      # In-container path of the repo-bundled static audio mount below.
      # ensureDefaults() copies the default sound effects from here.
      - SOUNDS_DIR=/sounds
    env_file:
      - ../controller/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - *state-mount
      - ../sounds:/sounds:ro

  # -------------------------------------------------------------------------
  # WEB — Next.js listener UI
  # -------------------------------------------------------------------------
  web:
    image: ghcr.io/perminder-klair/subwave-web:${SUBWAVE_VERSION:-latest}
    build:
      context: ..
      dockerfile: web/Dockerfile
      args:
        # Public origin for the Open Graph / Twitter share cards, canonical
        # URLs, robots.txt and the sitemap. Needed at BUILD time for the
        # statically-rendered routes (robots, sitemap, /listen, /landing,
        # /manual, /setup) — Next bakes their metadata at build.
        - SITE_URL=${SITE_URL:-}
        # Google Analytics Measurement ID (e.g. G-XXXXXXXXXX). NEXT_PUBLIC_*
        # is inlined into the client bundle at BUILD time. Unset → no tracking.
        - NEXT_PUBLIC_GA_ID=${NEXT_PUBLIC_GA_ID:-}
    container_name: sub-wave-web
    restart: unless-stopped
    depends_on:
      - controller
    environment:
      - NODE_ENV=production
      # Private boxes boot straight into the listener UI at /. Flip to
      # `landing` for the marketing host. /listen and /landing are always
      # available regardless.
      - SUBWAVE_HOMEPAGE=${SUBWAVE_HOMEPAGE:-player}
      # Also needed at RUNTIME: the homepage (/) is force-dynamic, so its
      # share-card tags render per-request. Set SITE_URL to the same value as
      # the build arg above (define it once in docker/.env and both pick it
      # up). Unset → a localhost origin, which breaks link previews.
      - SITE_URL=${SITE_URL:-}
    # Same-origin is the default baked into the image — Caddy routes /api/*
    # and /stream.mp3 to the right backend, so nothing extra needs setting.

volumes:
  caddy-data:
  caddy-config:
